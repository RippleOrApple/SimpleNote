name: simple_note
description: A minimal local-first notes and todos app for Windows and Android.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  flutter:
    sdk: flutter
  flutter_markdown: ^0.7.3
  flutter_riverpod: ^2.5.1
  path: ^1.9.1
  path_provider: ^2.1.6
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.34.1+1
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
